<html>

<head>
    <script src="purchase.js" defer></script>
</head>

<header>
    <h1>Select a Product</h1>
</header>

<body>
    <main>
        <section id="purchases">
            <h2>Make a purchase:</h2>
            <ul id="purchases-list"></ul>
            <form>
                <!--Product Name-->
                <label for="productName">Product:</label>
                <select name="productName">

                </select>
                <!--Quantity-->
                <label for="quantity">Quantity:</label>
                <input type="number" name="quantity">
                <!--Address-->
                <label for="address">Address:</label>
                <input type="text" name="address">
                <button type="submit" name="submitButton">Purchase</button>
                <button><a href="Index.html">Cancel</a></button>
            </form>
            <div id="purchase-success" style="color: green; margin-top: 10px;"></div>
        </section>
    </main>
</body>

</html>
